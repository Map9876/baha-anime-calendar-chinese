name: GNN Screenshot

on:
  schedule:
    - cron: "0 0 1 1,4,7,10 *"   # 每季度第一天 00:00 UTC
  workflow_dispatch:               # 手动触发

env:
  TZ: Asia/Taipei

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install puppeteer

      - name: Run gnnscreen
        run: node gnnscreen.js
        continue-on-error: true

      - name: Commit results
        run: |
          git config user.name "GitHub Actions[Bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gnn_screenshots/ README.md gnnscreen.js
          git commit -m "gnn: quarterly screenshot $(date '+%Y-%m-%d')" || echo "No changes"
          git push
