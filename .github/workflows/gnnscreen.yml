name: GNN Screenshot

on:
  schedule:
    - cron: "0 2 * * *"          # 每天 02:00 UTC = 10:00 台北
  workflow_dispatch:               # 手动触发

env:
  TZ: Asia/Taipei

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Chinese fonts
        run: |
          apt-get update -qq && apt-get install -y -qq fonts-noto-cjk fonts-noto-cjk-extra fonts-noto-color-emoji
          fc-cache -f 2>/dev/null
          echo "=== Available CJK fonts ==="
          fc-list :lang=zh 2>/dev/null | head -10 || echo "No CJK fonts found"
          echo "=== Noto fonts ==="
          fc-list | grep -i "noto\|cjk" | head -10 || echo "No Noto fonts"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start FlareSolverr
        run: |
          docker run -d --name flaresolverr -p 8191:8191 ghcr.io/flaresolverr/flaresolverr:latest
          sleep 15

      - name: Install deps
        run: npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth

      - name: Run gnnscreen
        run: DEBUG=1 node gnnscreen.js
        continue-on-error: true

      - name: Commit results
        run: |
          git config user.name "GitHub Actions[Bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gnn_screenshots/ README.md gnnscreen.js .github/workflows/gnnscreen.yml api/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "gnn: screenshot $(date '+%Y-%m-%d')"
            git pull --rebase
            git push
          fi
